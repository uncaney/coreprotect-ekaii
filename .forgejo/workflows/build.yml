name: Build CoreProtect (ekaii fork)
on:
  push:
    branches: [master, mc1.21.11]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: mc26.1.2-jdk25
            ref: refs/heads/master
            jdk: '25'
            artifact: CoreProtect-mc26.1.2
          - label: mc1.21.11-jdk21
            ref: refs/heads/mc1.21.11
            jdk: '21'
            artifact: CoreProtect-mc1.21.11
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}
          fetch-depth: 0
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin
      - name: Install Maven
        shell: bash
        run: |
          set -eux
          MVN_VERSION=3.9.9
          MVN_URL="https://dlcdn.apache.org/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz"
          MVN_BACKUP_URL="https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz"
          MVN_HOME="$HOME/.tools/maven-${MVN_VERSION}"
          mkdir -p "$MVN_HOME" "$HOME/.tools"
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL "$MVN_URL" -o /tmp/mvn.tgz || curl -fsSL "$MVN_BACKUP_URL" -o /tmp/mvn.tgz
          else
            wget -q "$MVN_URL" -O /tmp/mvn.tgz || wget -q "$MVN_BACKUP_URL" -O /tmp/mvn.tgz
          fi
          tar -C "$MVN_HOME" --strip-components=1 -xzf /tmp/mvn.tgz
          echo "$MVN_HOME/bin" >> "$GITHUB_PATH"
          "$MVN_HOME/bin/mvn" -v
      - name: Build
        run: mvn -B -DskipTests -Dproject.branch=master clean verify
      - name: Show artifact
        run: ls -la target/CoreProtect-*.jar
      - name: Upload jar
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact }}
          path: target/CoreProtect-*.jar
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release on tag
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pull pre-built jars from the matrix jobs instead of rebuilding.
      # Two ~22-minute redundant `mvn clean verify` runs gone; the release job
      # now depends only on the Forgejo API, not on Maven Central network luck.
      - name: Download mc26.1.2 jar
        uses: actions/download-artifact@v3
        with:
          name: CoreProtect-mc26.1.2
          path: artifacts/mc26.1.2
      - name: Download mc1.21.11 jar
        uses: actions/download-artifact@v3
        with:
          name: CoreProtect-mc1.21.11
          path: artifacts/mc1.21.11
      - name: List artifacts
        run: ls -la artifacts/mc26.1.2 artifacts/mc1.21.11
      - name: Create release + upload assets
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          REF_NAME="${GITHUB_REF##*/}"
          API="${GITHUB_API_URL:-https://forgejo.ekaii.fr/api/v1}"
          REPO="${GITHUB_REPOSITORY}"
          # Create the release. Tolerate 409 when re-running on an existing tag —
          # in that case fetch the existing release id and just upload missing assets.
          BODY=$(printf '{"tag_name":"%s","name":"%s","draft":false,"prerelease":false}' "$REF_NAME" "$REF_NAME")
          HTTP_CODE=$(curl -sS -o /tmp/rel.json -w "%{http_code}" \
            -X POST -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "$API/repos/$REPO/releases" -d "$BODY" || true)
          if [ "$HTTP_CODE" = "201" ]; then
            ID=$(sed -n 's/.*"id":\s*\([0-9]*\).*/\1/p' /tmp/rel.json | head -1)
            echo "Created release id: $ID"
          else
            echo "Release POST returned $HTTP_CODE — assuming release exists, fetching by tag."
            curl -fsS -H "Authorization: token $TOKEN" \
              "$API/repos/$REPO/releases/tags/$REF_NAME" -o /tmp/rel.json
            ID=$(sed -n 's/.*"id":\s*\([0-9]*\).*/\1/p' /tmp/rel.json | head -1)
            echo "Reusing release id: $ID"
          fi
          # Upload jars; tolerate 409 if asset already exists from a manual upload.
          for f in artifacts/mc26.1.2/CoreProtect-*.jar artifacts/mc1.21.11/CoreProtect-*.jar; do
            [ -f "$f" ] || { echo "missing: $f"; continue; }
            n=$(basename "$f")
            echo "Uploading $n"
            CODE=$(curl -sS -o /tmp/asset.json -w "%{http_code}" \
              -X POST -H "Authorization: token $TOKEN" \
              -F "attachment=@${f}" \
              "$API/repos/$REPO/releases/$ID/assets?name=${n}" || true)
            if [ "$CODE" = "201" ]; then
              echo "  ok"
            else
              echo "  HTTP $CODE — likely already attached, skipping"
            fi
          done
